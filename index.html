<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Notion日記</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --text-muted: #8888aa;
    --border: #2a2a4a;
    --success: #4caf50;
    --error: #f44336;
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* HEADER */
  .header {
    background: var(--surface);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 22px; cursor: pointer; padding: 4px 8px;
    border-radius: 8px; transition: color 0.2s;
  }

  /* MAIN */
  .main {
    flex: 1; padding: 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* DATE */
  .date-bar {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 18px; display: flex; align-items: center;
    gap: 12px; border: 1px solid var(--border);
  }
  .date-input {
    background: none; border: none; color: var(--text);
    font-size: 15px; font-family: var(--font); font-weight: 600;
    flex: 1; cursor: pointer;
  }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

  /* SECTION */
  .section-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }

  /* TAG BUTTONS (mood & 運動種別) */
  .tag-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-btn {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 50px; padding: 7px 14px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    color: var(--text); font-family: var(--font);
  }
  .tag-btn:hover { border-color: var(--accent2); }
  .tag-btn.selected { border-color: var(--accent); background: rgba(233,69,96,0.15); }
  .tag-btn.mood-pos { border-color: #7a6020; color: #f5d87a; }
  .tag-btn.mood-pos.selected { background: rgba(245,216,122,0.2); border-color: #f5d87a; }
  .tag-btn.mood-calm { border-color: #2a6040; color: #7adfa8; }
  .tag-btn.mood-calm.selected { background: rgba(122,223,168,0.2); border-color: #7adfa8; }
  .tag-btn.mood-neg { border-color: #6a2a3a; color: #f5a0b0; }
  .tag-btn.mood-neg.selected { background: rgba(245,100,120,0.2); border-color: #f5a0b0; }

  /* TEXTAREA */
  .diary-textarea {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 16px; line-height: 1.8;
    padding: 18px; resize: none; width: 100%; min-height: 220px;
    outline: none; transition: border-color 0.2s;
  }
  .diary-textarea:focus { border-color: var(--accent2); }
  .diary-textarea::placeholder { color: var(--text-muted); }
  .char-count { text-align: right; font-size: 12px; color: var(--text-muted); margin-top: -8px; }

  /* PHOTO */
  .photo-area {
    background: var(--surface); border: 2px dashed var(--border);
    border-radius: var(--radius); padding: 20px; text-align: center;
    cursor: pointer; transition: border-color 0.2s; position: relative;
  }
  .photo-area:hover { border-color: var(--accent2); }
  .photo-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-placeholder { color: var(--text-muted); font-size: 14px; }
  .photo-placeholder .photo-icon { font-size: 32px; margin-bottom: 8px; }
  .photo-previews {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; justify-content: center;
  }
  .photo-thumb {
    position: relative; width: 80px; height: 80px;
  }
  .photo-thumb img {
    width: 80px; height: 80px; object-fit: cover; border-radius: 10px;
    border: 2px solid var(--accent2);
  }
  .photo-thumb .remove-btn {
    position: absolute; top: -6px; right: -6px;
    background: var(--accent); border: none; border-radius: 50%;
    width: 20px; height: 20px; color: white; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }

  /* CUSTOM TAG INPUT */
  .custom-tag-row { display: flex; gap: 8px; margin-top: 8px; }
  .custom-tag-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: var(--font);
    font-size: 14px; padding: 8px 12px; flex: 1; outline: none;
    transition: border-color 0.2s;
  }
  .custom-tag-input:focus { border-color: var(--accent2); }
  .custom-tag-input::placeholder { color: var(--text-muted); }
  .add-tag-btn {
    background: var(--card); border: 1px solid var(--accent2);
    border-radius: 10px; color: var(--text); font-family: var(--font);
    font-size: 14px; padding: 8px 14px; cursor: pointer;
  }

  /* SEND */
  .send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius); color: white;
    font-family: var(--font); font-size: 17px; font-weight: 700;
    padding: 18px; width: 100%; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.03em;
  }
  .send-btn:active { transform: scale(0.98); opacity: 0.9; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success); color: white; padding: 14px 24px;
    border-radius: 50px; font-weight: 700; font-size: 15px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap; max-width: 90vw;
    text-align: center;
  }
  .toast.error { background: var(--error); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SETTINGS */
  .settings-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 16px;
  }
  .settings-field { display: flex; flex-direction: column; gap: 8px; }
  .settings-label {
    font-size: 13px; font-weight: 700; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .settings-input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: var(--font);
    font-size: 14px; padding: 12px 14px; width: 100%; outline: none;
    transition: border-color 0.2s;
  }
  .settings-input:focus { border-color: var(--accent2); }
  .settings-hint { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .settings-hint a { color: var(--accent); text-decoration: none; }
  .save-btn {
    background: var(--card); border: 1px solid var(--accent2);
    border-radius: var(--radius); color: var(--text); font-family: var(--font);
    font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; transition: all 0.2s;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); display: inline-block; }
  .status-dot.ok { background: var(--success); }

  .setup-banner {
    background: rgba(233,69,96,0.15); border: 1px solid var(--accent);
    border-radius: var(--radius); padding: 16px; display: flex; gap: 12px; align-items: flex-start;
  }
  .setup-banner-text { font-size: 14px; line-height: 1.6; }
  .setup-banner-text strong { color: var(--accent); }
  .setup-link-btn {
    background: var(--accent); border: none; border-radius: 8px; color: white;
    font-family: var(--font); font-size: 13px; font-weight: 700;
    padding: 8px 14px; cursor: pointer; margin-top: 8px; display: inline-block;
  }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-item {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent2); }
  .history-date { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .history-preview {
    font-size: 14px; color: var(--text-muted); line-height: 1.5;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .history-tags { font-size: 12px; color: var(--accent); margin-top: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }

  /* NAV */
  .bottom-nav {
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; background: none; border: none; color: var(--text-muted);
    cursor: pointer; padding: 8px 4px; display: flex; flex-direction: column;
    align-items: center; gap: 4px; font-family: var(--font);
    font-size: 10px; font-weight: 600; transition: color 0.2s;
  }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  .progress-label { font-size: 13px; opacity: 0.8; }
</style>
</head>
<body>

<!-- WRITE SCREEN -->
<div class="screen active" id="screen-write">
  <div class="header">
    <h1>✍️ 今日の日記</h1>
    <button class="header-btn" onclick="showScreen('settings')">⚙️</button>
  </div>
  <div class="main">

    <!-- Setup banner -->
    <div class="setup-banner" id="setup-banner" style="display:none">
      <div style="font-size:22px">🔑</div>
      <div class="setup-banner-text">
        <strong>初期設定が必要です</strong><br>
        Notion Integration TokenとデータベースIDを設定してください。
        <br><button class="setup-link-btn" onclick="showScreen('settings')">設定を開く</button>
      </div>
    </div>

    <!-- Date -->
    <div class="date-bar">
      <span style="font-size:20px">📅</span>
      <input type="date" class="date-input" id="diary-date">
    </div>

    <!-- Mood -->
    <div>
      <div class="section-label">mood（複数選択可）</div>
      <div class="tag-grid" id="mood-grid">
        <button class="tag-btn mood-pos" data-mood="ワクワク" onclick="toggleTag(this,'mood')">ワクワク</button>
        <button class="tag-btn mood-pos" data-mood="楽しい" onclick="toggleTag(this,'mood')">楽しい</button>
        <button class="tag-btn mood-pos" data-mood="嬉しい" onclick="toggleTag(this,'mood')">嬉しい</button>
        <button class="tag-btn mood-pos" data-mood="達成感" onclick="toggleTag(this,'mood')">達成感</button>
        <button class="tag-btn mood-pos" data-mood="満足" onclick="toggleTag(this,'mood')">満足</button>
        <button class="tag-btn mood-pos" data-mood="Happy" onclick="toggleTag(this,'mood')">😊 Happy</button>
        <button class="tag-btn mood-pos" data-mood="Excited" onclick="toggleTag(this,'mood')">😆 Excited</button>
        <button class="tag-btn mood-pos" data-mood="Inspired" onclick="toggleTag(this,'mood')">🤩 Inspired</button>
        <button class="tag-btn mood-calm" data-mood="安心" onclick="toggleTag(this,'mood')">安心</button>
        <button class="tag-btn mood-calm" data-mood="穏やか" onclick="toggleTag(this,'mood')">穏やか</button>
        <button class="tag-btn mood-calm" data-mood="和やか" onclick="toggleTag(this,'mood')">和やか</button>
        <button class="tag-btn mood-calm" data-mood="ゆったり" onclick="toggleTag(this,'mood')">ゆったり</button>
        <button class="tag-btn mood-calm" data-mood="落ち着く" onclick="toggleTag(this,'mood')">落ち着く</button>
        <button class="tag-btn mood-calm" data-mood="Calm" onclick="toggleTag(this,'mood')">😊 Calm</button>
        <button class="tag-btn mood-neg" data-mood="不安" onclick="toggleTag(this,'mood')">不安</button>
        <button class="tag-btn mood-neg" data-mood="退屈" onclick="toggleTag(this,'mood')">退屈</button>
        <button class="tag-btn mood-neg" data-mood="心配" onclick="toggleTag(this,'mood')">心配</button>
        <button class="tag-btn mood-neg" data-mood="悲しい" onclick="toggleTag(this,'mood')">悲しい</button>
        <button class="tag-btn mood-neg" data-mood="苦しい" onclick="toggleTag(this,'mood')">苦しい</button>
        <button class="tag-btn mood-neg" data-mood="焦り" onclick="toggleTag(this,'mood')">焦り</button>
        <button class="tag-btn mood-neg" data-mood="ウザい" onclick="toggleTag(this,'mood')">ウザい</button>
        <button class="tag-btn mood-neg" data-mood="悔しい" onclick="toggleTag(this,'mood')">悔しい</button>
        <button class="tag-btn mood-neg" data-mood="イライラ" onclick="toggleTag(this,'mood')">イライラ</button>
        <button class="tag-btn mood-neg" data-mood="怒り" onclick="toggleTag(this,'mood')">怒り</button>
        <button class="tag-btn mood-neg" data-mood="Annoyed" onclick="toggleTag(this,'mood')">😑 Annoyed</button>
        <button class="tag-btn mood-neg" data-mood="Angry" onclick="toggleTag(this,'mood')">😡 Angry</button>
        <button class="tag-btn mood-neg" data-mood="Tired" onclick="toggleTag(this,'mood')">😫 Tired</button>
        <button class="tag-btn mood-neg" data-mood="Uninspired / Bored" onclick="toggleTag(this,'mood')">😒 Uninspired / Bored</button>
        <button class="tag-btn mood-neg" data-mood="Sad" onclick="toggleTag(this,'mood')">😔 Sad</button>
      </div>
    </div>

    <!-- 運動種別 -->
    <div>
      <div class="section-label">運動種別（複数選択可）</div>
      <div class="tag-grid" id="sport-grid">
        <button class="tag-btn" data-sport="ピラティス" onclick="toggleTag(this,'sport')">🧘 ピラティス</button>
        <button class="tag-btn" data-sport="オンラインフィットネス" onclick="toggleTag(this,'sport')">💻 オンラインフィットネス</button>
        <button class="tag-btn" data-sport="パーソナルトレーニング" onclick="toggleTag(this,'sport')">💪 パーソナルトレーニング</button>
        <button class="tag-btn" data-sport="スイミング" onclick="toggleTag(this,'sport')">🏊 スイミング</button>
      </div>
    </div>

    <!-- Diary content -->
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="section-label">日記</div>
      <textarea class="diary-textarea" id="diary-content"
        placeholder="今日はどんな一日でしたか？&#10;&#10;気づいたこと、感じたこと、何でも書いてみましょう。"
        oninput="updateCharCount()"></textarea>
      <div class="char-count"><span id="char-count">0</span> 文字</div>
    </div>

    <!-- Photo -->
    <div>
      <div class="section-label">写真（複数枚可）</div>
      <div class="photo-area" onclick="document.getElementById('photo-input').click()">
        <input type="file" id="photo-input" accept="image/*" multiple
          onchange="handlePhotos(event)" style="display:none">
        <div class="photo-placeholder" id="photo-placeholder">
          <div class="photo-icon">📷</div>
          <div>タップして写真を選択</div>

        <div class="photo-previews" id="photo-previews"></div>

    <!-- Send -->
    <button class="send-btn" id="send-btn" onclick="saveDiary()">

  </div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="header">
    <h1>📚 過去の日記</h1>
    <button class="header-btn" onclick="clearHistory()">🗑️</button>
  </div>
  <div class="main">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- SETTINGS SCREEN -->
<div class="screen" id="screen-settings">
  <div class="header">
    <button class="header-btn" onclick="showScreen('write')">←</button>
    <h1>⚙️ 設定</h1>
    <div style="width:40px"></div>
  </div>
  <div class="main">
    <div class="settings-card">
      <div class="settings-field">
        <div class="settings-label">
          <span class="status-dot" id="status-dot"></span>
          Notion Integration Token
        </div>
        <input type="password" class="settings-input" id="notion-token" placeholder="secret_xxxxxxxxxxxxxxxx">
        <div class="settings-hint">
          <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a>
          でIntegrationを作成してTokenをコピー
        </div>
      </div>
      <div class="settings-field">
        <div class="settings-label">データベースID</div>
        <input type="text" class="settings-input" id="notion-db" placeholder="32桁の英数字">
        <div class="settings-hint">NotionデータベースURLの /p/ 以降の32文字</div>
      </div>
      <button class="save-btn" onclick="saveSettings()">💾 設定を保存</button>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text-muted);padding:8px">
      設定はこのデバイスにのみ保存されます
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-write" onclick="showScreen('write')">
    <span class="nav-icon">✍️</span>書く
  </button>
  <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
    <span class="nav-icon">📚</span>履歴
  </button>
  <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
    <span class="nav-icon">⚙️</span>設定
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// STATE
let selectedMoods = new Set();
let selectedSports = new Set();
let selectedPhotos = []; // { file, previewUrl }

// INIT
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('diary-date').value = `${yyyy}-${mm}-${dd}`;
  loadSettings();
  checkSetup();
  renderHistory();
});

// SCREEN NAV
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  if (name === 'history') renderHistory();
}

// TAGS (mood & sport)
function toggleTag(btn, type) {
  const val = btn.dataset[type === 'mood' ? 'mood' : 'sport'];
  const set = type === 'mood' ? selectedMoods : selectedSports;
  if (set.has(val)) { set.delete(val); btn.classList.remove('selected'); }
  else { set.add(val); btn.classList.add('selected'); }
}


// CHAR COUNT
function updateCharCount() {
  document.getElementById('char-count').textContent =
    document.getElementById('diary-content').value.length;
}

// PHOTOS
function handlePhotos(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      selectedPhotos.push({ file, previewUrl: ev.target.result });
      renderPhotoPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = ''; // reset so same file can be re-added
}

function renderPhotoPreviews() {
  const container = document.getElementById('photo-previews');
  const placeholder = document.getElementById('photo-placeholder');
  placeholder.style.display = selectedPhotos.length ? 'none' : 'block';
  container.innerHTML = selectedPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.previewUrl}" alt="photo">
      <button class="remove-btn" onclick="removePhoto(${i});event.stopPropagation()">×</button>
    </div>
  `).join('');
}

function removePhoto(i) {
  selectedPhotos.splice(i, 1);
  renderPhotoPreviews();
}

// SETTINGS
function loadSettings() {
  const token = localStorage.getItem('notion_token') || '';
  const db = localStorage.getItem('notion_db') || '';
  document.getElementById('notion-token').value = token;
  document.getElementById('notion-db').value = db;
  updateStatusDot(!!token && !!db);
}

function saveSettings() {
  const token = document.getElementById('notion-token').value.trim();
  const db = document.getElementById('notion-db').value.trim().replace(/-/g, '');
  if (!token || !db) { showToast('TokenとDBIDを入力してください', 'error'); return; }
  localStorage.setItem('notion_token', token);
  localStorage.setItem('notion_db', db);
  updateStatusDot(true);
  showToast('設定を保存しました ✓');
  checkSetup();
}

function updateStatusDot(ok) {
  const d = document.getElementById('status-dot');
  if (d) d.className = 'status-dot' + (ok ? ' ok' : '');
}

function checkSetup() {
  const ok = localStorage.getItem('notion_token') && localStorage.getItem('notion_db');
  document.getElementById('setup-banner').style.display = ok ? 'none' : 'flex';
}

// SAVE DIARY
async function saveDiary() {
  const token = localStorage.getItem('notion_token');
  const dbId = localStorage.getItem('notion_db');
  if (!token || !dbId) { showToast('先に設定を完了してください', 'error'); showScreen('settings'); return; }

  const date = document.getElementById('diary-date').value;
  const content = document.getElementById('diary-content').value.trim();
  if (!content) { showToast('日記の内容を入力してください', 'error'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    // 1. Upload photos if any
    let fileIds = [];
    if (selectedPhotos.length > 0) {
      btn.innerHTML = `<span class="spinner"></span>写真をアップロード中… (0/${selectedPhotos.length})`;
      for (let i = 0; i < selectedPhotos.length; i++) {
        btn.innerHTML = `<span class="spinner"></span>写真をアップロード中… (${i+1}/${selectedPhotos.length})`;
        try {
          const fid = await uploadPhoto(selectedPhotos[i].file, token, dbId);
          if (fid) fileIds.push(fid);
        } catch(photoErr) {
          console.warn('写真アップロード失敗:', photoErr);
          showToast(`写真${i+1}枚目のアップロードに失敗（日記は保存します）`, 'error');
        }
      }
    }

    // 2. Create page
    btn.innerHTML = '<span class="spinner"></span>Notionに保存中...';

    const props = {
      '日記': { title: [{ text: { content } }] },
      '日付': { date: { start: date } }
    };
    if (selectedMoods.size > 0) {
      props['mood'] = { multi_select: [...selectedMoods].map(m => ({ name: m })) };
    }
    if (selectedSports.size > 0) {
      props['運動種別'] = { multi_select: [...selectedSports].map(s => ({ name: s })) };
    }
    if (fileIds.length > 0) {
      props['写真'] = { files: fileIds.map(id => ({ type: 'file_upload', file_upload: { id } })) };
    }

    const res = await fetch('https://corsproxy.io/?https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify({ parent: { database_id: dbId }, properties: props })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'APIエラー (' + res.status + ')');
    }

    const page = await res.json();
    saveToHistory({
      date, content,
      moods: [...selectedMoods],
      sports: [...selectedSports],
      photoCount: fileIds.length,
      notionUrl: page.url
    });

    showToast('Notionに保存しました ✓');
    resetForm();

  } catch(e) {
    console.error(e);
    showToast('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Notionに保存する';
  }
}

// PHOTO UPLOAD to Notion
async function uploadPhoto(file, token, dbId) {
  // Step 1: Create file upload object
  const createRes = await fetch('https://corsproxy.io/?https://api.notion.com/v1/files', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28'
    },
    body: JSON.stringify({
      parent: { type: 'database_id', database_id: dbId }
    })
  });
  if (!createRes.ok) {
    const e = await createRes.json();
    throw new Error(e.message || '写真アップロード準備エラー');
  }
  const { id: fileId, upload_url: uploadUrl } = await createRes.json();

  // Step 2: Upload file binary
  const formData = new FormData();
  formData.append('file', file, file.name);

  const uploadRes = await fetch(uploadUrl, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  });
  if (!uploadRes.ok) throw new Error('写真バイナリのアップロードに失敗');

  return fileId;
}

function resetForm() {
  document.getElementById('diary-content').value = '';
  document.getElementById('char-count').textContent = '0';
  selectedMoods.clear();
  selectedSports.clear();
  selectedPhotos = [];
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
  renderPhotoPreviews();
  document.getElementById('photo-placeholder').style.display = 'block';
}

// HISTORY
function saveToHistory(entry) {
  const h = getHistory();
  h.unshift({ ...entry, savedAt: new Date().toISOString() });
  localStorage.setItem('diary_history', JSON.stringify(h.slice(0, 50)));
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem('diary_history') || '[]'); } catch { return []; }
}
function renderHistory() {
  const list = document.getElementById('history-list');
  const history = getHistory();
  if (!history.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>まだ日記がありません。<br>最初の一ページを書いてみましょう！</p></div>`;
    return;
  }
  list.innerHTML = history.map(e => `
    <div class="history-item" onclick="openNotion('${e.notionUrl || ''}')">
      <div class="history-date">${formatDateJP(e.date)}${e.photoCount ? ' 📷×'+e.photoCount : ''}</div>
      <div class="history-preview">${escapeHtml(e.content)}</div>
      <div class="history-tags">${[...(e.moods||[]), ...(e.sports||[])].join(' · ')}</div>
    </div>
  `).join('');
}
function openNotion(url) { if (url) window.open(url, '_blank'); }
function clearHistory() {
  if (!confirm('履歴をすべて削除しますか？\n（Notionのページは削除されません）')) return;
  localStorage.removeItem('diary_history');
  renderHistory();
}

function formatDateJP(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// TOAST
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type==='error' ? ' error' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
